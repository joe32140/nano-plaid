name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Rust runs on three platforms so every fused kernel is actually executed:
  # ubuntu-latest is x86_64 with AVX2 (the masked-SAD binary kernel and the
  # pshufb residual kernel), macos-latest is Apple arm64 with dotprod (the
  # SDOT binary kernel and the tbl residual kernel), ubuntu-24.04-arm is a
  # Neoverse arm64 — same NEON kernels on a different microarchitecture,
  # exactly where SDOT-vs-SMMLA issue rates can flip (see kernels/README).
  # The *_rungs_agree tests assert each available kernel is bit-identical to
  # the scalar reference.
  rust:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: kernels
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --release
      # Indicative only — GitHub runners are shared VMs, so treat the absolute
      # µs/doc as noisy; it shows which fused kernel this arch dispatches to.
      - name: bench (indicative)
        run: cargo run --release --example bench

  # The numpy engine: self-test plus the committed toy bundle end-to-end.
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install numpy
      - run: python nanoplaid.py
      - run: python eval.py data/toy --n-full 64

  # The pyo3 bridge, end-to-end on all three platforms: build the wheel,
  # assert the extension reproduces the numpy specs (this executes AVX2 on
  # ubuntu-latest and NEON on both arm runners), then run the committed toy
  # bundle through `--backend rust` so the fused residual + binary paths are
  # exercised inside the real two-stage search.
  bridge:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install numpy .
      - run: python kernels/test_bridge.py
      - run: python eval.py data/toy --schemes residual4,binary --backend rust --n-full 64

  # AVX-512 VNNI is a per-run LOTTERY on GitHub's shared x86 runners: an Intel
  # Ice Lake draw has it, an AMD EPYC draw does not. So the `rust` job above
  # only executes the avx512 kernels when it happens to draw the right silicon —
  # and when it doesn't, the `if let Some(v) = maxsim_avx512` parity checks pass
  # trivially without running a thing. This job removes the luck: Intel SDE
  # emulates an Ice Lake core (synthetic CPUID and all), so runtime feature
  # detection reports VNNI and the fused kernels run DETERMINISTICALLY every
  # time. `NANOPLAID_REQUIRE_AVX512=1` makes `avx512_kernels_run_when_required`
  # fail loudly if the emulated CPU somehow didn't expose VNNI — no silent skip.
  # Timing under emulation is meaningless, so this proves CORRECTNESS, not speed;
  # the real µs/doc come from a natural Intel draw of the `rust` job.
  avx512-emulated:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kernels
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: petarpetrovt/setup-sde@v5.0
      - name: test under SDE (Ice Lake — AVX-512 VNNI)
        env:
          NANOPLAID_REQUIRE_AVX512: "1"
        run: |
          export CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER="$SDE_PATH/sde64 -icx --"
          cargo test --release
